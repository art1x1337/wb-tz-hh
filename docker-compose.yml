version: "3.9"

services:
  db:
    image: postgres:15
    container_name: wb_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    env_file:
    - .env
    build: .
    container_name: wb_app
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: postgres
      DB_PORT: 5432
    ports:
      - "3000:3000"
    command: npm run start

volumes:
  postgres_data: